{% macro render_nav(active_page) -%}
    <div class="flex flex-wrap items-center gap-2">
        <a href="/" class="tap-target inline-flex items-center justify-center rounded-2xl px-4 text-sm font-semibold transition {% if active_page == 'dashboard' %}bg-sky-500 text-slate-950{% else %}border border-white/10 bg-white/5 text-slate-100 hover:bg-white/10{% endif %}">
            Dashboard
        </a>
        <a href="/settings" class="tap-target inline-flex items-center justify-center rounded-2xl px-4 text-sm font-semibold transition {% if active_page == 'settings' %}bg-sky-500 text-slate-950{% else %}border border-white/10 bg-white/5 text-slate-100 hover:bg-white/10{% endif %}">
            Einstellungen
        </a>
    </div>
{%- endmacro %}

{% macro render_page_header(title, active_page) -%}
    <header class="rounded-3xl border border-white/10 bg-slate-950/85 px-4 py-3 backdrop-blur">
        <div class="flex flex-col gap-4 lg:flex-row lg:items-center lg:justify-between">
            <div class="flex items-center gap-4">
                <img src="/static/logo.png" alt="KeepUp Logo" class="h-16 w-16 rounded-2xl border border-white/10 bg-white/5 object-cover p-1.5 shadow-panel">
                <div>
                    <p class="text-xs uppercase tracking-[0.28em] text-sky-300/80">KeepUp Monitor</p>
                    <h1 class="text-2xl font-semibold tracking-tight">{{ title }}</h1>
                </div>
            </div>

            <div class="lg:ml-6">
                {{ render_nav(active_page) }}
            </div>
        </div>
    </header>
{%- endmacro %}
